<nav class="navbar" [class.scrolled]="isScrolled">
  <div class="navbar__brand">
    <span class="navbar__logo-mark">H</span>
    <span class="navbar__logo-text">HomeHaven</span>
  </div>
  <ul class="navbar__links">
    <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" class="nav-link">Home</a></li>
    <li><a routerLink="/services" routerLinkActive="active" class="nav-link">Services</a></li>
    <li><a routerLink="/contact" routerLinkActive="active" class="nav-link">Contact</a></li>
  </ul>
  <a routerLink="/contact" class="btn btn--outline">Get Started</a>
  <button class="navbar__hamburger" (click)="toggleMenu()" [class.open]="menuOpen">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="mobile-menu" [class.open]="menuOpen">
  <ul>
    <li><a routerLink="/" (click)="toggleMenu()">Home</a></li>
    <li><a routerLink="/services" (click)="toggleMenu()">Services</a></li>
    <li><a routerLink="/contact" (click)="toggleMenu()">Contact</a></li>
  </ul>
</div>
